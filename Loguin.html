<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - PVP</title>
  <link rel="stylesheet" href="Loguin.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="login-bg">


<nav class="navbar navbar-expand-lg navbar-dark custom-navbar">
<div class="container-fluid d-flex align-items-center">
    
<a class="navbar-brand logo-frame d-flex align-items-center" href="#">
<h2 class="me-2"><span class="flipped">P</span>VP</h2>
</a>


<a href="PVP.html" class="botao ms-auto">Voltar</a>
</div>
</nav>


<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
<div class="card shadow-lg p-4" style="max-width: 400px; width: 100%; background: rgba(255,255,255,0.9);">

<form>
        
<div class="mb-3">
<label for="email" class="form-label">E-mail</label>
<input type="email" class="form-control" id="email" placeholder="Digite seu e-mail" required>
</div>

<div class="mb-3">
<label for="senha" class="form-label">Senha</label>
<input type="password" class="form-control" id="senha" placeholder="Digite sua senha" required>
</div>

<div class="d-grid">
<button type="submit" class="botao">Entrar</button>
</div>
</form>

<div class="text-center mt-3">
<a href="recuperarsenha.html">Esqueceu a senha?</a><br>
<a href="cadastro.html">Ainda não tem conta? Cadastre-se</a>
</div>
</div>
</div>

</body>
</html>
