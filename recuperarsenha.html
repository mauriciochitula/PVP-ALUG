<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar Senha - PVP</title>
  <link rel="stylesheet" href="recuperarsenha.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="recuperar-bg">


<nav class="navbar navbar-expand-lg navbar-dark custom-navbar">
<div class="container-fluid d-flex align-items-center">
      
<a class="navbar-brand logo-frame d-flex align-items-center" href="#">
<h2 class="me-2"><span class="flipped">P</span>VP</h2>
</a>


<a href="index.html" class="botao ms-auto">Voltar</a>
</div>
</nav>


<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
<div class="card shadow-lg p-4" style="max-width: 450px; width: 100%; background: rgba(255,255,255,0.9);">

<form id="recuperarForm">
<h4 class="text-center mb-3">Recuperar Senha</h4>

      
<div class="mb-3">
<label for="email" class="form-label">E-mail (opcional)</label>
<input type="email" class="form-control" id="email" placeholder="Digite seu e-mail">
</div>
        
<div class="mb-3">
<label for="telefone" class="form-label">Telefone (opcional)</label>
<input type="tel" class="form-control" id="telefone" placeholder="(99) 99999-9999">
</div>

        
<div class="d-grid">
<button type="submit" class="botao">Enviar código</button>
</div>
</form>

<div class="text-center mt-3">
<a href="cadastro.html">Ainda não tem conta? Cadastre-se</a>
</div>
</div>
</div>


  <script>
    document.getElementById("recuperarForm").addEventListener("submit", function(event) {
      const email = document.getElementById("email").value.trim();
      const telefone = document.getElementById("telefone").value.trim();

      if (email === "" && telefone === "") {
        alert("Por favor, informe E-mail ou Telefone para receber o código.");
        event.preventDefault();
      } else {
        alert("Um código de confirmação foi enviado para o contato informado.");
        
      }
    });
  </script>

</body>
</html>
