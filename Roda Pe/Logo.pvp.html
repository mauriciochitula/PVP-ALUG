<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PVP Logo</title>
  <style>
    /* Moldura azul bem escuro */
    .logo-frame {
      background-color: #0b1d46; /* Azul bem escuro */
      padding: 10px 10px;
      border-radius: 12px;
      display: inline-block;
    }

    /* Primeiro P virado */
    .flipped {
      display: inline-block;
      transform: scaleX(-1);
    }

    /* Texto dentro da moldura */
    .logo-frame h2 {
      color: white;
      margin: 0;
      font-weight: bold;
      font-size: 40px;
      font-family: Arial, sans-serif;
    }

    /* Centralizar na tela */
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #e3f2fd; /* Azul claro de fundo */
    }
  </style>
</head>
<body>
  <div class="logo-frame">
    <h2><span class="flipped">P</span>VP</h2>
  </div>
</body>
</html>

</html>
