<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro - PVP</title>
  <link rel="stylesheet" href="Cadastro.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="cadastro-bg">


<nav class="navbar navbar-expand-lg navbar-dark custom-navbar">
<div class="container-fluid d-flex align-items-center">

<a class="navbar-brand logo-frame d-flex align-items-center" href="#">
<h2 class="me-2"><span class="flipped">P</span>VP</h2>
</a>


<a href="index.html" class="botao ms-auto">Voltar</a>

</div>
</nav>


<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
<div class="card shadow-lg p-4" style="max-width: 450px; width: 100%; background: rgba(255,255,255,0.9);">

<form id="cadastroForm">
        
<div class="mb-3">
<label for="nome" class="form-label">Nome completo</label>
<input type="text" class="form-control" id="nome" placeholder="Digite seu nome" required>
</div>
        
<div class="mb-3">
<label for="email" class="form-label">E-mail (opcional)</label>
<input type="email" class="form-control" id="email" placeholder="Digite seu e-mail">
</div>
        
<div class="mb-3">
<label for="telefone" class="form-label">Telefone (opcional)</label>
<input type="tel" class="form-control" id="telefone" placeholder="(99) 99999-9999">
</div>

<div class="mb-3">
<label for="senha" class="form-label">Senha</label>
<input type="password" class="form-control" id="senha" placeholder="Crie uma senha" required>
</div>

<div class="mb-3">
<label for="confirmar-senha" class="form-label">Confirmar senha</label>
<input type="password" class="form-control" id="confirmar-senha" placeholder="Repita sua senha" required>
</div>

<div class="d-grid">
<button type="submit" class="botao">Cadastrar</button>
</div>
</form>

<div class="text-center mt-3">
<a href="loguin.html">Já tem conta? Faça login</a>
</div>
</div>
</div>

  
<script>
    document.getElementById("cadastroForm").addEventListener("submit", function(event) {
      const email = document.getElementById("email").value.trim();
      const telefone = document.getElementById("telefone").value.trim();

      if (email === "" && telefone === "") {
        alert("Por favor, informe pelo menos E-mail ou Telefone.");
        event.preventDefault(); // impede envio
      }

      const senha = document.getElementById("senha").value;
      const confirmarSenha = document.getElementById("confirmar-senha").value;

      if (senha !== confirmarSenha) {
        alert("As senhas não coincidem!");
        event.preventDefault();
      }
    });
  </script>

</body>
</html>
